<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CCal 班表</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f2f2f7; color: #1c1c1e; }

    /* 電腦上預設：模擬手機寬度置中 */
    @media (min-width: 600px) {
      body:not(.desktop-mode) #app {
        max-width: 390px;
        margin: 0 auto;
        box-shadow: 0 0 40px rgba(0,0,0,0.12);
        min-height: 100vh;
        background: #f2f2f7;
      }
    }
    /* 電腦寬版 */
    @media (min-width: 600px) {
      body.desktop-mode .day-cell { min-height: 90px; }
      body.desktop-mode .event-pill { font-size: 11px; height: 20px; line-height: 20px; }
      body.desktop-mode .day-num { font-size: 15px; width: 24px; height: 24px; }
      body.desktop-mode header, body.desktop-mode .weekday-row { max-width: none; }
    }
    /* 切換按鈕：手機隱藏，電腦才顯示 */
    .view-toggle-btn { display: none; }
    @media (min-width: 600px) {
      .view-toggle-btn { display: block; font-size: 16px; cursor: pointer; padding: 4px 8px; background: none; border: none; color: #8e8e93; }
    }

    header { background:#fff; padding:8px 16px; display:flex; flex-direction:column; border-bottom:1px solid #e5e5ea; position:sticky; top:0; z-index:10; }
    .header-nav { display:flex; align-items:center; justify-content:space-between; }
    .nav-btn { background:none; border:none; font-size:22px; cursor:pointer; padding:4px 12px; color:#007aff; }
    .month-label { font-size:17px; font-weight:600; }
    .user-label { font-size:11px; color:#8e8e93; text-align:center; padding-bottom:2px; letter-spacing:0.5px; }
    .refresh-btn { background:none; border:none; font-size:16px; cursor:pointer; padding:4px 8px; color:#8e8e93; }

    .weekday-row { display:grid; grid-template-columns:repeat(7,1fr); background:#fff; border-bottom:1px solid #e5e5ea; }
    .weekday-row div { text-align:center; padding:5px 0; font-size:11px; color:#8e8e93; font-weight:500; }
    .weekday-row div:first-child { color:#ff3b30; }
    .weekday-row div:last-child { color:#007aff; }

    .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:#e5e5ea; }

    .day-cell { background:#fff; min-height:72px; padding:4px 0; overflow:visible; position:relative; }
    .day-num-wrap { padding:0 4px; margin-bottom:3px; }
    .day-num { font-size:14px; font-weight:500; width:22px; height:22px; display:flex; align-items:center; justify-content:center; }
    .day-cell.other-month .day-num { color:#c7c7cc; }
    .day-cell.today .day-num { background:#007aff; color:#fff !important; border-radius:50%; }
    .col-sun .day-num { color:#ff3b30; }
    .col-sat .day-num { color:#007aff; }

    /* Pills */
    .event-pill { font-size:10px; border-radius:4px; padding:0 5px; margin:1px 4px; height:18px; line-height:18px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; }
    .event-pill.flight { background:#007aff; color:#fff; }
    .event-pill.flight.past { background:#a8d4ff; color:#4a80c4; }
    .event-pill.rdo     { background:#fff3cd; color:#856404; }
    .event-pill.al      { background:#d4f5e0; color:#1a7a42; }
    .event-pill.xl      { background:#fde8d8; color:#8b3a00; }
    .event-pill.cm      { background:#e1f5fe; color:#0277bd; }
    .event-pill.mt      { background:#d4f5e0; color:#1a7a42; }
    .ac-badge { font-size:11px; font-weight:700; background:#e8f0fe; color:#1a6ef7; border-radius:6px; padding:2px 8px; white-space:nowrap; flex-shrink:0; }
    .event-pill.dayoff  { background:#fde8e8; color:#c0392b; }
    .event-pill.meeting { background:#d4f5e0; color:#1a7a42; }
    .event-pill.private { background:#ede7f6; color:#5c35a0; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* Multi-day bar */
    .event-pill.bar-start { border-radius:4px 0 0 4px; margin-right:-1px; }
    .event-pill.bar-mid   { border-radius:0; margin-left:-1px; margin-right:-1px; }
    .event-pill.bar-end   { border-radius:0 4px 4px 0; margin-left:-1px; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:100; align-items:flex-end; }
    .modal-overlay.active { display:flex; }
    .modal { background:#fff; border-radius:14px 14px 0 0; padding:10px 16px 24px; width:100%; max-height:55vh; overflow-y:auto; }
    .modal-handle { width:32px; height:4px; background:#e5e5ea; border-radius:2px; margin:0 auto 10px; }

    .task-date { font-size:11px; color:#8e8e93; margin-bottom:2px; }
    .task-route { font-size:15px; font-weight:700; margin-bottom:10px; }

    .leg-block { background:#f9f9f9; border-radius:8px; padding:8px 10px; margin-bottom:6px; }
    .leg-title { font-size:12px; font-weight:600; color:#007aff; margin-bottom:4px; }
    .leg-row { display:flex; justify-content:space-between; align-items:center; padding:3px 0; }
    .leg-row .lbl { font-size:11px; color:#8e8e93; min-width:36px; }
    .leg-row .val { font-size:13px; font-weight:600; }
    .leg-row.fdp-row { border-top:1px solid #ebebeb; margin-top:4px; padding-top:6px; }
    .leg-row.fdp-row .lbl { color:#1c1c1e; font-weight:700; font-size:12px; }
    .leg-row.fdp-row .val { font-weight:700; }
    .actual { color:#34c759; }
    .tz-note { font-size:10px; color:#ff9500; text-align:center; background:#fff8ee; border-radius:4px; padding:4px 8px; margin-bottom:10px; }
    .day-shift { color:#ff9500; font-size:8px; vertical-align:super; }
    .tz-div { color:#c7c7cc; font-size:11px; margin:0 3px; }
    .tz-tp  { color:#007aff; font-size:12px; }
    /* 比對第一人：淡橘 */
    .event-pill.cmp        { background:#fde8cc !important; color:#8b4500 !important; }
    .event-pill.flight.cmp { background:#f9c98a !important; color:#7a4000 !important; }
    .event-pill.flight.cmp.bar-start { border-radius:6px 0 0 6px; }
    .event-pill.flight.cmp.bar-end   { border-radius:0 6px 6px 0; }
    .event-pill.flight.cmp.bar-mid   { border-radius:0; }
    /* 比對第二人：淡黃 */
    .event-pill.cmp2        { background:#fff9cc !important; color:#7a6200 !important; }
    .event-pill.flight.cmp2 { background:#f5e88a !important; color:#6b5500 !important; }
    .event-pill.flight.cmp2.bar-start { border-radius:6px 0 0 6px; }
    .event-pill.flight.cmp2.bar-end   { border-radius:0 6px 6px 0; }
    .event-pill.flight.cmp2.bar-mid   { border-radius:0; }
    .cmp-banner { background:#eef0f5; color:#555; font-size:12px; font-weight:600; text-align:center; padding:6px 12px; }
    .contact-chip { display:inline-flex; align-items:center; gap:6px; background:#f2f2f7; border-radius:20px; padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer; margin:4px 4px 0 0; border:none; }
    .contact-chip:active { background:#e5e5ea; }
    .contact-chip .chip-del { color:#c7c7cc; font-size:15px; line-height:1; margin-left:2px; }
    .cell-layer-own  { height:20px; overflow:visible; }
    .cell-layer-work { height:20px; overflow:visible; }
    .cell-layer-priv { overflow:visible; }
    .cell-layer-cmp  { height:20px; border-top:1px dashed #f9c98a; padding-top:1px; overflow:visible; }
    .cell-layer-cmp2 { height:20px; border-top:1px dashed #f5e88a; padding-top:1px; overflow:visible; }
    .layover-block { background:#f0f6ff; border-radius:8px; padding:8px 10px; margin-bottom:6px; }
    .layover-row { display:flex; justify-content:space-between; align-items:center; font-size:12px; padding:2px 0; }
    .layover-row .lbl { color:#8e8e93; }
    .layover-row .val { font-weight:600; }
    .layover-row.warn .val { color:#ff3b30; }
    .afterduty-block { background:#f9f9f9; border-radius:8px; padding:8px 10px; margin-top:4px; }
    .afterduty-row { display:flex; justify-content:space-between; font-size:12px; padding:2px 0; }
    .afterduty-row .lbl { color:#8e8e93; }
    .afterduty-row .val { font-weight:600; }
    .layover-block a { color:#007aff; text-decoration:none; }
    .dt { font-size:10px; color:#8e8e93; margin-right:2px; font-weight:400; }

    /* Swap form */
    .swap-type-row { display:flex; background:#f2f2f7; border-radius:10px; padding:2px; margin-bottom:14px; }
    .swap-type-btn { flex:1; border:none; background:none; border-radius:8px; padding:8px 0; font-size:14px; font-weight:600; color:#8e8e93; cursor:pointer; }
    .swap-type-btn.active { background:#fff; color:#1c1c1e; box-shadow:0 1px 4px rgba(0,0,0,0.12); }
    .swap-flight-info { font-size:13px; color:#8e8e93; margin-bottom:12px; }
    .comm-label { font-size:12px; color:#8e8e93; margin-bottom:6px; }
    .comm-grid { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .comm-btn { border:1.5px solid #e5e5ea; background:#fff; border-radius:8px; padding:7px 10px; font-size:13px; font-weight:600; color:#1c1c1e; cursor:pointer; min-width:52px; text-align:center; }
    .comm-btn.active { border-color:#007aff; background:#e8f0fe; color:#007aff; }
    .swap-note-input { width:100%; border:1px solid #e5e5ea; border-radius:8px; padding:8px 10px; font-size:14px; background:#f9f9f9; margin-bottom:14px; outline:none; font-family:inherit; }
    .swap-note-input:focus { border-color:#007aff; background:#fff; }
    .swap-post-btn { width:100%; background:#007aff; color:#fff; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:700; cursor:pointer; }
    .swap-post-btn:disabled { background:#a8d4ff; cursor:not-allowed; }
    .open-swap-btn { width:100%; background:#f2f2f7; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:600; color:#007aff; cursor:pointer; margin-top:12px; }

    /* Add/Edit form */
    .add-section-label { font-size:12px; color:#8e8e93; margin:10px 0 6px; }
    .duty-type-row { display:flex; background:#f2f2f7; border-radius:10px; padding:2px; margin-bottom:12px; }
    .duty-type-btn { flex:1; border:none; background:none; border-radius:8px; padding:7px 0; font-size:13px; font-weight:600; color:#8e8e93; cursor:pointer; }
    .duty-type-btn.active { background:#fff; color:#1c1c1e; box-shadow:0 1px 4px rgba(0,0,0,0.12); }
    .ac-type-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
    .ac-btn { border:1.5px solid #e5e5ea; background:#fff; border-radius:8px; padding:6px 10px; font-size:13px; font-weight:600; color:#1c1c1e; cursor:pointer; }
    .ac-btn.active { border-color:#007aff; background:#e8f0fe; color:#007aff; }
    .add-row2 { display:flex; gap:8px; margin-bottom:0; }
    .add-row2 > div { flex:1; }
    .add-field-input { width:100%; border:1px solid #e5e5ea; border-radius:8px; padding:9px 10px; font-size:14px; outline:none; font-family:inherit; background:#fff; margin-bottom:10px; }
    .add-field-input:focus { border-color:#007aff; }
    .add-field-input.upper { text-transform:uppercase; }
    .add-save-btn { width:100%; background:#007aff; color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; margin-top:4px; }
    .add-del-btn { width:100%; background:#fff; color:#ff3b30; border:1.5px solid #ff3b30; border-radius:12px; padding:11px; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }
    .open-edit-btn { width:100%; background:#f2f2f7; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:600; color:#1c1c1e; cursor:pointer; margin-top:8px; }
    .open-add-day-btn { width:100%; background:#f2f2f7; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:600; color:#007aff; cursor:pointer; margin-top:8px; }
    .sby-pill { background:#1e3a8a; color:#e0eaff; }
    .leg-section-header { display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:700; color:#007aff; margin-bottom:8px; padding-bottom:6px; border-bottom:1.5px solid #e8f0fe; }
    .leg-remove-btn { background:none; border:none; color:#ff3b30; font-size:13px; font-weight:600; cursor:pointer; padding:0; }
    .leg-divider { border:none; border-top:1px solid #e5e5ea; margin:4px 0 12px; }
    .add-leg-btn { width:100%; background:#f2f2f7; border:none; border-radius:10px; padding:10px; font-size:14px; font-weight:600; color:#007aff; cursor:pointer; margin:4px 0 12px; }
    /* Modal 跟著手機版寬度 */
    @media (min-width:600px) {
      body:not(.desktop-mode) .modal { max-width:390px; margin:0 auto; }
    }

    /* 密碼閘門 */
    .gate-overlay { display:none; position:fixed; inset:0; background:#f2f2f7; z-index:200; align-items:center; justify-content:center; }
    .gate-overlay.active { display:flex; }
    .gate-card { background:#fff; border-radius:20px; padding:32px 24px; width:calc(100% - 48px); max-width:340px; box-shadow:0 4px 24px rgba(0,0,0,0.10); }
    .gate-title { font-size:22px; font-weight:800; color:#1c1c1e; margin-bottom:4px; }
    .gate-sub { font-size:13px; color:#8e8e93; margin-bottom:24px; }
    .gate-input { width:100%; border:1.5px solid #e5e5ea; border-radius:12px; padding:13px 14px; font-size:16px; outline:none; font-family:inherit; background:#f9f9f9; margin-bottom:12px; }
    .gate-input:focus { border-color:#007aff; background:#fff; }
    .gate-btn { width:100%; background:#007aff; color:#fff; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:700; cursor:pointer; }
    .gate-btn:disabled { background:#a8d4ff; cursor:not-allowed; }
    .gate-err { font-size:12px; color:#ff3b30; min-height:16px; margin-top:6px; text-align:center; }

    /* Settings */
    .settings-btn { font-size:18px; cursor:pointer; padding:4px 8px; background:none; border:none; color:#8e8e93; }
    .sf-group { display:flex; flex-direction:column; gap:4px; }
    .sf-label { font-size:12px; color:#8e8e93; }
    .sf-input { width:100%; border:1px solid #e5e5ea; border-radius:8px; padding:10px 12px; font-size:14px; outline:none; font-family:inherit; background:#fff; }
    .sf-input:focus { border-color:#007aff; }
    .sf-save-btn { width:100%; background:#34c759; color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; margin-top:4px; }
  </style>
</head>
<body>
<div id="app">
<header>
  <div class="header-nav">
    <button class="nav-btn" id="prev">‹</button>
    <span class="month-label" id="month-label"></span>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="view-toggle-btn" id="view-toggle-btn" title="切換手機/電腦版">📱</button>
      <button class="settings-btn" id="import-pdf-btn" title="匯入 eCrew PDF 班表">📥</button>
      <button class="settings-btn" id="user-code-btn" title="我的代碼 / 看別人班表">👥</button>
      <button class="settings-btn" id="settings-btn" title="換班板設定">⚙</button>
      <button class="refresh-btn" id="refresh-btn" title="從行事曆更新資料">↻</button>
      <button class="nav-btn" id="next">›</button>
    </div>
  </div>
  <div class="user-label" id="user-label"></div>
</header>
<div class="weekday-row">
  <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
</div>
<div class="calendar-grid" id="calendar"></div>
</div><!-- #app -->

<div class="gate-overlay" id="gate-overlay">
  <div class="gate-card">
    <div class="gate-title">CCal 班表</div>
    <!-- 第一步：密碼 -->
    <div id="gate-step1">
      <div class="gate-sub">請輸入存取密碼</div>
      <input class="gate-input" id="gate-input" type="password" placeholder="密碼" autocomplete="off"
        onkeydown="if(event.key==='Enter')submitGate()">
      <button class="gate-btn" id="gate-btn" onclick="submitGate()">進入</button>
      <div class="gate-err" id="gate-err"></div>
    </div>
    <!-- 第二步：員編 -->
    <div id="gate-step2" style="display:none">
      <div class="gate-sub">請輸入你的員編</div>
      <input class="gate-input" id="gate-empid" type="text" inputmode="numeric" placeholder="例：644392" autocomplete="off"
        onkeydown="if(event.key==='Enter')submitEmpId()">
      <button class="gate-btn" id="gate-empid-btn" onclick="submitEmpId()">開始使用</button>
      <div class="gate-err" id="gate-empid-err"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
let scheduleData = []
let tasks = []
let compareList = []   // [{ userId, data, tasks }, ...]  最多 2 人
let currentYear = new Date().getFullYear()
let currentMonth = new Date().getMonth()

function todayISO() {
  const t = new Date()
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`
}
function isPast(dateStr) { return dateStr < todayISO() }

// ── 使用者 ID（房間代碼）──────────────────────────────────────
function _genId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
  return Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join('')
}
// 從 localStorage 取，或在記憶體暫存一個（通過密碼後才真正寫入）
const MY_USER_ID = localStorage.getItem('cCalUserId') || _genId()
// ?view=XXXXXX → 查看他人班表
let viewUserId = (new URLSearchParams(location.search).get('view') || MY_USER_ID).toUpperCase()
const IS_VIEWING_OTHER = viewUserId !== MY_USER_ID

function hhmm(s) { return s && s.length >= 4 ? s.slice(0,2)+':'+s.slice(2,4) : '--' }
function padFN(n) { return String(n).padStart(3, '0') }

function minDiff(a, b) {
  if (!a || !b || a.length < 4 || b.length < 4) return 0
  let am = +a.slice(0,2)*60 + +a.slice(2,4)
  let bm = +b.slice(0,2)*60 + +b.slice(2,4)
  if (bm <= am) bm += 1440
  return bm - am
}

function getMRT(fdpMin) {
  if (fdpMin <= 480) return 540   // 法規 MRT 9h（飛航任務前須休 10h，由 AOR 另定）
  if (fdpMin <= 720) return 720
  if (fdpMin <= 960) return 1200
  return 1440
}

function getMRTLabel(fdpMin) {
  if (!fdpMin) return '--'
  if (fdpMin <= 480) return '9h（飛航任務前須休 10h）'
  if (fdpMin <= 720) return '12h'
  if (fdpMin <= 960) return '20h'
  return '24h'
}

function crossDayMinDiff(dateA, timeA, dateB, timeB) {
  if (!timeA || !timeB) return 0
  const dayDiff = (new Date(dateB) - new Date(dateA)) / 86400000
  const minA = +timeA.slice(0,2)*60 + +timeA.slice(2,4)
  const minB = +timeB.slice(0,2)*60 + +timeB.slice(2,4)
  return Math.round(dayDiff * 1440 + (minB - minA))
}

const HOME_BASES = ['TPE', 'TSA', 'KHH']

function addMins(hhmm4, mins) {
  let m = (+hhmm4.slice(0,2)*60 + +hhmm4.slice(2,4) + mins) % 1440
  return String(Math.floor(m/60)).padStart(2,'0') + String(m%60).padStart(2,'0')
}

function subMins(hhmm4, mins) {
  let m = ((+hhmm4.slice(0,2)*60 + +hhmm4.slice(2,4) - mins) % 1440 + 1440) % 1440
  return String(Math.floor(m/60)).padStart(2,'0') + String(m%60).padStart(2,'0')
}

function fmtMin(m) { return m > 0 ? Math.floor(m/60)+'h'+(m%60?m%60+'m':'') : null }

// ── 雙時區工具 ────────────────────────────────────────────────
const STATION_TZ = {
  'TPE':'Asia/Taipei','TSA':'Asia/Taipei',
  'NRT':'Asia/Tokyo','HND':'Asia/Tokyo','KIX':'Asia/Tokyo','NGO':'Asia/Tokyo',
  'FUK':'Asia/Tokyo','CTS':'Asia/Tokyo','HIJ':'Asia/Tokyo','KMJ':'Asia/Tokyo',
  'OKA':'Asia/Tokyo','ITM':'Asia/Tokyo','TAK':'Asia/Tokyo',
  'ICN':'Asia/Seoul','GMP':'Asia/Seoul','PUS':'Asia/Seoul',
  'PVG':'Asia/Shanghai','PEK':'Asia/Shanghai','SHA':'Asia/Shanghai',
  'CAN':'Asia/Shanghai','CTU':'Asia/Shanghai','CKG':'Asia/Shanghai','HGH':'Asia/Shanghai',
  'BKK':'Asia/Bangkok','CNX':'Asia/Bangkok',
  'HAN':'Asia/Ho_Chi_Minh','SGN':'Asia/Ho_Chi_Minh',
  'SIN':'Asia/Singapore',
  'KUL':'Asia/Kuala_Lumpur','PEN':'Asia/Kuala_Lumpur',
  'CGK':'Asia/Jakarta','DPS':'Asia/Makassar',
  'MNL':'Asia/Manila','CEB':'Asia/Manila',
  'HKG':'Asia/Hong_Kong',
  'RGN':'Asia/Rangoon',

// 取得某時區在指定 Date 的 UTC offset（分鐘）
function tzOffsetMin(date, ianaZone) {
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: ianaZone, year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false
  })
  const p = Object.fromEntries(fmt.formatToParts(date).map(x => [x.type, x.value]))
  const hr = p.hour === '24' ? '00' : p.hour
  const localAsUTC = new Date(`${p.year}-${p.month}-${p.day}T${hr}:${p.minute}:${p.second}Z`)
  return (localAsUTC - date) / 60000
}

// 外站當地時間 HHMM → 台北時間，回傳 { t:'HH:MM', dayShift }
function toTaipei(dateStr, hhmm4, stationCode) {
  const tz = STATION_TZ[stationCode]
  if (!tz) return null
  const approx = new Date(`${dateStr}T${hhmm4.slice(0,2)}:${hhmm4.slice(2,4)}:00Z`)
  const stOffset = tzOffsetMin(approx, tz)
  const utcMs = approx.getTime() - stOffset * 60000
  const taipeiMs = utcMs + 480 * 60000
  const t = new Date(taipeiMs)
  const th = String(t.getUTCHours()).padStart(2,'0')
  const tm = String(t.getUTCMinutes()).padStart(2,'0')
  const legMidnight = new Date(dateStr + 'T00:00:00Z').getTime()
  const tpMidnight  = taipeiMs - (t.getUTCHours() * 3600000 + t.getUTCMinutes() * 60000)
  const dayShift = Math.round((tpMidnight - legMidnight) / 86400000)
  return { t: `${th}:${tm}`, dayShift }
}

// 產生雙時區 HTML：當地L / 台北T（UTC+8 站只顯示一個）
function dualT(hhmm4, dateStr, stationCode) {
  if (!hhmm4 || hhmm4.length < 4) return '--'
  const local = `${hhmm4.slice(0,2)}:${hhmm4.slice(2,4)}`
  // 台灣機場：只顯示台北時間，不加 L/T 說明
  if (['TPE','TSA','KHH','RMQ','TNN','CYI','HUN','TTT','MZG','KNH','LZN','MFK'].includes(stationCode)) return `${local}T`
  const tp = toTaipei(dateStr, hhmm4, stationCode)
  if (!tp) return `${local}T`  // 未知時區，當台北時間顯示
  const ds = tp.dayShift === 1  ? '<span class="day-shift">+1</span>'
           : tp.dayShift === -1 ? '<span class="day-shift">-1</span>' : ''
  return `${local}L <span class="tz-div">/</span> <span class="tz-tp">${tp.t}T${ds}</span>`
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T12:00:00')
  d.setDate(d.getDate() + n)
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0')
}
function md(dateStr) {
  const p = dateStr.split('-')
  return `${+p[1]}/${+p[2]}`
}

function groupTasks(flights) {
  const HOME = 'TPE'
  const sorted = [...flights].sort((a,b) => {
    const da = a.start || (a.date + 'T00:00:00')
    const db = b.start || (b.date + 'T00:00:00')
    return new Date(da) - new Date(db)
  })
  // 先依 duty_id 分組
  const dutyMap = new Map()
  const noDuty = []
  for (const f of sorted) {
    if (f.duty_id) {
      if (!dutyMap.has(f.duty_id)) dutyMap.set(f.duty_id, [])
      dutyMap.get(f.duty_id).push(f)
    } else {
      noDuty.push(f)
    }
  }
  const tasks = []
  for (const [, legs] of dutyMap) {
    const lastLeg = legs[legs.length-1]
    const endDate = lastLeg.arrival_next_day ? addDays(lastLeg.date, 1) : lastLeg.date
    tasks.push({ legs, startDate: legs[0].date, endDate })
  }
  // 沒有 duty_id 的用原本 from/to 邏輯
  for (const f of noDuty) {
    const last = tasks.length ? tasks[tasks.length-1] : null
    const lastLeg = last ? last.legs[last.legs.length-1] : null
    if (f.from && f.from !== HOME && lastLeg && lastLeg.to === f.from) {
      last.legs.push(f)
      last.endDate = f.date
    } else {
      tasks.push({ legs:[f], startDate:f.date, endDate:f.date })
    }
  }
  return tasks.sort((a,b) => new Date(a.startDate) - new Date(b.startDate))
}

function taskRoute(t) {
  const pts = [t.legs[0].from, ...t.legs.map(l=>l.to)].filter(p => p && p !== 'undefined')
  return pts.length ? pts.join('→') : ''
}

function tasksOnDate(dateStr) {
  return tasks.filter(t => dateStr >= t.startDate && dateStr <= t.endDate)
}
function compareTasksOnDate(tasks, dateStr) {
  return tasks.filter(t => dateStr >= t.startDate && dateStr <= t.endDate)
}

function renderCalendar() {
  document.getElementById('month-label').textContent = `${currentYear} 年 ${currentMonth+1} 月`
  const cal = document.getElementById('calendar')
  cal.innerHTML = ''

  const first = new Date(currentYear, currentMonth, 1)
  const offset = first.getDay()
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate()
  const t = new Date()
  const todayStr = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`
  const total = Math.ceil((offset+daysInMonth)/7)*7
  const cols = ['col-sun','','','','','','col-sat']

  for (let i = 0; i < total; i++) {
    const cellDate = new Date(currentYear, currentMonth, 1+i-offset)
    const isCur = cellDate.getMonth() === currentMonth
    const col = i % 7
    const ds = `${cellDate.getFullYear()}-${String(cellDate.getMonth()+1).padStart(2,'0')}-${String(cellDate.getDate()).padStart(2,'0')}`
    const isToday = ds === todayStr

    const cell = document.createElement('div')
    cell.className = ['day-cell', cols[col], isCur?'':'other-month', isToday?'today':''].filter(Boolean).join(' ')

    const wrap = document.createElement('div')
    wrap.className = 'day-num-wrap'
    const dn = document.createElement('div')
    dn.className = 'day-num'
    dn.textContent = cellDate.getDate()
    wrap.appendChild(dn)
    cell.appendChild(wrap)

    // ── 建立自己層容器 ────────────────────────────────────────
    const ownLayer = document.createElement('div')
    ownLayer.className = compareList.length ? 'cell-layer-own' : 'cell-layer-work'
    cell.appendChild(ownLayer)

    // ── 自己層：飛航任務 ──────────────────────────────────────
    const _ownFlights = tasksOnDate(ds)
    _ownFlights.forEach(task => {
      const isStart = ds === task.startDate
      const isEnd   = ds === task.endDate
      const sameDay = task.startDate === task.endDate
      const vStart  = isStart || col === 0
      const vEnd    = isEnd   || col === 6
      const pill = document.createElement('div')
      let cls = 'event-pill flight' + (task.endDate < todayStr ? ' past' : '')
      if (!sameDay) {
        if (vStart && !vEnd)       cls += ' bar-start'
        else if (!vStart && vEnd)  cls += ' bar-end'
        else if (!vStart && !vEnd) cls += ' bar-mid'
      }
      pill.className = cls
      pill.textContent = (isStart || col === 0) ? padFN(task.legs[0].flight_number) : ' '
      pill.addEventListener('click', e => { e.stopPropagation(); showDetail(task) })
      ownLayer.appendChild(pill)
    })

    // ── 自己層：非飛航事件 ────────────────────────────────────
    const _ownNF = scheduleData.filter(e => {
      if (!e.type || e.type === 'flight') return false
      const s = e.startDate || e.date, en = e.endDate || e.date
      if (ds < s || ds > en) return false
      if (['ADO','OFF','>OFF'].includes(e.code)) return false
      return e.manually_added || e.ecrew_imported || ['RDO','AL','XL','HC','CM','SBY'].includes(e.code)
    })
    const _nonPrivateNF = _ownNF.filter(e => e.type !== 'private')
    const _privateNF    = _ownNF.filter(e => e.type === 'private')

    const _renderNFPill = (ev, target) => {
      const pill = document.createElement('div')
      const typeClass = { training:'cm', day_off:'dayoff', meeting:'meeting', standby:'sby-pill', private:'private' }[ev.type] || (ev.code||'').toLowerCase() || 'al'
      let cls = 'event-pill ' + (ev.type === 'standby' || ev.code === 'SBY' ? 'sby-pill' : typeClass)
      const evStart = ev.startDate || ev.date
      const evEnd   = ev.endDate   || ev.date
      const isMulti = evStart !== evEnd
      if (isMulti) {
        const vS = ds === evStart || col === 0, vE = ds === evEnd || col === 6
        if      (vS && !vE) cls += ' bar-start'
        else if (!vS && vE) cls += ' bar-end'
        else if (!vS && !vE) cls += ' bar-mid'
      }
      pill.className = cls
      const showText = !isMulti || ds === evStart || col === 0
      pill.textContent = showText ? (ev.type === 'private' ? (ev.title || '私人') : (ev.code || ev.type)) : ' '
      pill.addEventListener('click', e => { e.stopPropagation(); showNonFlightDetail(ev) })
      target.appendChild(pill)
    }

    if (compareList.length) {
      // 比對模式：有私人行程就顯示日期底色；私人 pill 一律不渲染
      if (_privateNF.length > 0) { wrap.style.background = '#ede7f6'; wrap.style.borderRadius = '6px' }
      _nonPrivateNF.forEach(ev => _renderNFPill(ev, ownLayer))
    } else {
      // 純自己模式：工作事件在第一層，私人事件固定在第二層
      _nonPrivateNF.forEach(ev => _renderNFPill(ev, ownLayer))
      if (_privateNF.length > 0) {
        const privLayer = document.createElement('div')
        privLayer.className = 'cell-layer-priv'
        _privateNF.forEach(ev => _renderNFPill(ev, privLayer))
        cell.appendChild(privLayer)
      }
    }

    // ── 比對層（每人一層，固定位置；私人行程不顯示）──────────
    const layerClasses = ['cell-layer-cmp', 'cell-layer-cmp2']
    const pillClasses  = ['cmp', 'cmp2']
    compareList.forEach((cmp, ci) => {
      const cmpLayer = document.createElement('div')
      cmpLayer.className = layerClasses[ci]
      const pc = pillClasses[ci]
      compareTasksOnDate(cmp.tasks, ds).forEach(task => {
        const isStart = ds === task.startDate
        const isEnd   = ds === task.endDate
        const sameDay = task.startDate === task.endDate
        const vStart  = isStart || col === 0
        const vEnd    = isEnd   || col === 6
        const pill = document.createElement('div')
        let cls = `event-pill flight ${pc}` + (task.endDate < todayStr ? ' past' : '')
        if (!sameDay) {
          if (vStart && !vEnd)       cls += ' bar-start'
          else if (!vStart && vEnd)  cls += ' bar-end'
          else if (!vStart && !vEnd) cls += ' bar-mid'
        }
        pill.className = cls
        pill.textContent = (isStart || col === 0) ? padFN(task.legs[0].flight_number) : ' '
        pill.addEventListener('click', e => { e.stopPropagation(); showDetail(task) })
        cmpLayer.appendChild(pill)
      })
      cmp.data.filter(e =>
        e.date === ds && e.type && e.type !== 'flight' && e.type !== 'private' &&
        !['ADO','OFF','>OFF'].includes(e.code) &&
        (e.manually_added || e.ecrew_imported || ['RDO','AL','XL','HC','CM','SBY'].includes(e.code))
      ).forEach(ev => {
        const pill = document.createElement('div')
        pill.className = `event-pill ${pc}`
        pill.textContent = ev.code || ev.type
        cmpLayer.appendChild(pill)
      })
      cell.appendChild(cmpLayer)
    })

    // 點空白格子 → 新增（查看他人、過去日期停用）
    if (isCur && viewUserId === MY_USER_ID && !isPast(ds)) {
      cell.style.cursor = 'pointer'
      cell.addEventListener('click', () => showAddForm(ds))
    }

    cal.appendChild(cell)
  }
}

  }

  function fmtInline(sched, actual) {
    const s = sched && sched.t ? `${sched.t}L${sd(sched.shift)}` : ''
    const a = actual && actual.t ? ` <span class="actual">(A${actual.t}L${sd(actual.shift)})</span>` : ''
    return (s || a) ? `${s}${a}` : '--'
  }

  const wd = ['日','一','二','三','四','五','六']
  const s = task.startDate.split('-'), e = task.endDate.split('-')
  const sameDay = task.startDate === task.endDate
  const dateLabel = sameDay
    ? `${+s[1]} 月 ${+s[2]} 日（${wd[new Date(task.startDate).getDay()]}）`
    : `${+s[1]}/${+s[2]}（${wd[new Date(task.startDate).getDay()]}）～ ${+e[1]}/${+e[2]}（${wd[new Date(task.endDate).getDay()]}）`

  // 有外站就顯示雙時區說明
  const hasOverseas = task.legs.some(l => l.from && !['TPE','TSA'].includes(l.from) || l.to && !['TPE','TSA'].includes(l.to))
  const tzNote = hasOverseas
    ? `<div class="tz-note">時間格式：當地時間L <span class="tz-div">/</span> <span class="tz-tp">台北時間T</span></div>`
    : ''

  let html = `<div class="task-date">${dateLabel}</div><div class="task-route">${taskRoute(task)}</div>${tzNote}`

  // 手動多天班（無 reporting 欄位）強制每腿拆成獨立 segment，才能顯示 Layover 區塊
  const isManualMultiDay = task.startDate !== task.endDate && task.legs.every(l => l.manually_added)
  const segments = []
  task.legs.forEach(leg => {
    const forceNew = isManualMultiDay && segments.length > 0
    if (leg.reporting || segments.length === 0 || forceNew) segments.push({ legs: [] })
    segments[segments.length - 1].legs.push(leg)
  })

  segments.forEach((seg, si) => {
    const firstLeg = seg.legs[0]
    const lastLeg  = seg.legs[seg.legs.length - 1]

    const fdpEndS = lastLeg.arrival_scheduled || lastLeg.arrival
    const fdpEndA = lastLeg.arrival_actual
    const segFdpMinS = (firstLeg.reporting && fdpEndS) ? minDiff(firstLeg.reporting, fdpEndS) : 0
    const segFdpMinA = (firstLeg.reporting && fdpEndA) ? minDiff(firstLeg.reporting, fdpEndA) : 0
    const segFdpMin  = segFdpMinA || segFdpMinS

    seg.legs.forEach(leg => {
      const legD = leg.date.split('-')
      const ftDepS = leg.departure_scheduled || leg.departure
      const ftArrS = leg.arrival_scheduled   || leg.arrival
      const hasTimeData = leg.reporting || ftDepS || ftArrS || leg.departure_actual || leg.arrival_actual
      // 日期只在有時間資料、或是整個 task 第一腿時顯示
      const showLegDate = !sameDay && (hasTimeData || (si === 0 && leg === seg.legs[0]))
      const legLabel = showLegDate ? `${+legD[1]}/${+legD[2]}（${wd[new Date(leg.date).getDay()]}）　` : ''

      const rep  = cvt(leg.reporting)
      const depS = cvt(leg.departure_scheduled || leg.departure)
      const depA = cvt(leg.departure_actual)
      const arrS = cvt(leg.arrival_scheduled   || leg.arrival)
      const arrA = cvt(leg.arrival_actual)
      const ftMinS = (ftDepS && ftArrS) ? minDiff(ftDepS, ftArrS) : 0
      const ftMinA = (leg.departure_actual && leg.arrival_actual) ? minDiff(leg.departure_actual, leg.arrival_actual) : 0
      const ftLabel = ftMinS && ftMinA && ftMinS !== ftMinA
        ? `${fmtMin(ftMinS)} <span class="actual">(A${fmtMin(ftMinA)})</span>`
        : (fmtMin(ftMinS || ftMinA) || '--')

      const repDate = leg.date
      const depDate = leg.date
      const depRaw = ftDepS
      const arrRaw = ftArrS || leg.arrival_actual
      const arrDate = leg.arrival_next_day ? addDays(leg.date, 1)
                    : (depRaw && arrRaw && arrRaw < depRaw) ? addDays(leg.date, 1)
                    : leg.date

      const D = s => `<span class="dt">${md(s)}</span> `

      const routePart = (leg.from || leg.to) ? `　${leg.from||'?'} → ${leg.to||'?'}` : ''
      const fnPart = leg.flight_number ? `CI ${padFN(leg.flight_number)}` : ''
      const acBadge = leg.aircraft_type ? `<span class="ac-badge">${leg.aircraft_type}</span>` : ''
      html += `<div class="leg-block">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
          <div class="leg-title" style="margin-bottom:0">${legLabel}${fnPart}${routePart}</div>
          ${acBadge}
        </div>`
      const _depA = leg.departure_actual
      const _arrA = leg.arrival_actual
      const _depSt = dualT(ftDepS, depDate, leg.from)
      const _depAt = _depA ? `<span class="actual"> (A${dualT(_depA, depDate, leg.from)})</span>` : ''
      const _arrSt = dualT(ftArrS, arrDate, leg.to)
      const _arrAt = _arrA ? `<span class="actual"> (A${dualT(_arrA, arrDate, leg.to)})</span>` : ''
      html += `<div class="leg-row"><span class="lbl">報到</span><span class="val">${leg.reporting ? D(repDate)+dualT(leg.reporting, repDate, leg.from) : '--'}</span></div>`
      html += `<div class="leg-row"><span class="lbl">起飛</span><span class="val">${(ftDepS||_depA) ? D(depDate)+(_depSt==='--'?'':_depSt)+_depAt : '--'}</span></div>`
      const arrDatePrefix = arrDate !== depDate ? D(arrDate) : ''
      html += `<div class="leg-row"><span class="lbl">降落</span><span class="val">${(ftArrS||_arrA) ? arrDatePrefix+(_arrSt==='--'?'':_arrSt)+_arrAt : '--'}</span></div>`
      html += `<div class="leg-row"><span class="lbl">飛時</span><span class="val">${(ftMinS || ftMinA) ? ftLabel : '--'}</span></div>`

      if (leg === lastLeg) {
        const fdpLabel = segFdpMin
          ? (segFdpMinS && segFdpMinA && segFdpMinS !== segFdpMinA
              ? `${fmtMin(segFdpMinS)} <span class="actual">(A${fmtMin(segFdpMinA)})</span>`
              : fmtMin(segFdpMin))
          : '--'
        html += `<div class="leg-row fdp-row"><span class="lbl">FDP</span><span class="val">${fdpLabel}</span></div>`
      }
      html += `</div>`
    })

    if (si < segments.length - 1) {
      const station = lastLeg.to || null
      const info = station ? OUTSTATION_INFO[station] : null
      const nextSeg = segments[si + 1]
      const nextETDraw = nextSeg.legs[0].departure_scheduled || nextSeg.legs[0].departure || nextSeg.legs[0].departure_actual
      const mrtStr = segFdpMin ? `MRT ${getMRTLabel(segFdpMin)}` : 'MRT --'
      let lb = `<div class="layover-block">
        <div class="layover-row"><span class="lbl">Layover ${station || '--'}</span><span class="val">${mrtStr}</span></div>`
      lb += `<div class="layover-row"><span class="lbl">飯店</span><span class="val">${info ? `<a href="${info.mapUrl}" target="_blank">${info.hotel}</a>` : '--'}</span></div>`
      if (info && nextETDraw) {
        const nextDate = nextSeg.legs[0].date
        const LD = (t) => {
          const d = t > nextETDraw ? addDays(nextDate, -1) : nextDate
          return `<span class="dt">${md(d)}</span> `
        }
        if (info.checkoutMins) {
          if (info.wakeupMins) {
            const wt = subMins(nextETDraw, info.wakeupMins)
            lb += `<div class="layover-row"><span class="lbl">起床</span><span class="val">${LD(wt)}${hhmm(wt)}L</span></div>`
          } else {
            lb += `<div class="layover-row"><span class="lbl">起床</span><span class="val">依 CKIN 組員</span></div>`
          }
          const ct = subMins(nextETDraw, info.checkoutMins)
          lb += `<div class="layover-row"><span class="lbl">Check-out</span><span class="val">${LD(ct)}${hhmm(ct)}L</span></div>`
        } else {
          lb += `<div class="layover-row"><span class="lbl">Check-out</span><span class="val" style="color:#8e8e93">待補</span></div>`
        }
      } else {
        lb += `<div class="layover-row"><span class="lbl">起床</span><span class="val">--</span></div>`
        lb += `<div class="layover-row"><span class="lbl">Check-out</span><span class="val">--</span></div>`
      }
      lb += `</div>`
      html += lb
    } else {
      if (lastLeg.to && !HOME_BASES.includes(lastLeg.to)) {
        html += `<div class="layover-block">
          <div class="layover-row"><span class="lbl">外站 ${lastLeg.to}</span><span class="val">MRT ${getMRTLabel(segFdpMin)}</span></div>
        </div>`
      } else {
        // 回 HOME 或 to 不明 → afterduty，無資料顯示 --
        const mrtVal = segFdpMin ? getMRTLabel(segFdpMin) : '--'
        const internalVal = taskFlightNum ? `${internalRestLabel}（CI${taskFlightNum}）` : '--'
        html += `<div class="afterduty-block">
          <div class="afterduty-row"><span class="lbl">MRT</span><span class="val">${mrtVal}</span></div>
          <div class="afterduty-row"><span class="lbl">表定休時</span><span class="val">${internalVal}</span></div>
        </div>`
      }
    }
  })

  const todayStr2 = new Date().toISOString().slice(0,10)
  if (task.startDate >= todayStr2) {
    html += `<button class="open-swap-btn" onclick="showSwapForm()">✈️ 發布到換班板</button>`
  }
  const isManual = task.legs.every(l => l.manually_added)
  if (isManual) {
    html += `<button class="open-edit-btn" onclick="showAddForm('${task.startDate}', window._swapTask)">✏️ 修改</button>`
    html += `<button class="add-del-btn" onclick="deleteEntry()">刪除此勤務</button>`
  }
  if (task.startDate >= todayStr2) {
    html += `<button class="open-add-day-btn" onclick="showAddForm('${task.startDate}')">＋ 新增</button>`
  }
  window._swapTask = task
  document.getElementById('modal-content').innerHTML = html
  document.getElementById('modal-overlay').classList.add('active')
}

function showNonFlightDetail(ev) {
  const wd = ['日','一','二','三','四','五','六']
  const fmtDate = s => { const d = new Date(s+'T12:00:00'); return `${d.getMonth()+1}/${d.getDate()}（${wd[d.getDay()]}）` }
  const evStart = ev.startDate || ev.date, evEnd = ev.endDate || ev.date
  const dateLabel = evStart === evEnd ? fmtDate(evStart) : `${fmtDate(evStart)} ～ ${fmtDate(evEnd)}`
  const typeLabel = { day_off:'休假', training:'受訓', meeting:'會議', standby:'待命', private:'私人行程' }[ev.type] || ev.type
  let html = `<div class="task-date">${dateLabel}</div>`
  html += `<div class="task-route">${typeLabel}　<span style="font-weight:400;font-size:14px;color:#8e8e93">${ev.type==='private'?(ev.title||''):(ev.code||'')}</span></div>`

  if (ev.type === 'private') {
    if (ev.note) {
      html += `<div class="leg-block"><div class="leg-row"><span class="lbl">說明</span><span class="val">${ev.note}</span></div></div>`
    }
  } else if (ev.type === 'standby') {
    html += `<div class="leg-block">`
    html += `<div class="leg-row"><span class="lbl">班號</span><span class="val">${ev.code || '--'}</span></div>`
    if (ev.start_time || ev.end_time) {
      const fmt = t => t ? t.slice(0,2)+':'+t.slice(2,4) : '--'
      html += `<div class="leg-row"><span class="lbl">時段</span><span class="val">${fmt(ev.start_time)} ～ ${fmt(ev.end_time)}</span></div>`
    }
    html += `</div>`
  } else {
    const extras = []
    if (ev.course)   extras.push(['課程', ev.course])
    if (ev.location) extras.push(['地點', ev.location])
    if (ev.note && ev.note !== ev.code) extras.push(['說明', ev.note])
    if (extras.length) {
      html += `<div class="leg-block">`
      extras.forEach(([k,v]) => { html += `<div class="leg-row"><span class="lbl">${k}</span><span class="val">${v}</span></div>` })
      html += `</div>`
      if (ev.sessions && ev.sessions.length) {
        html += `<div class="leg-block">`
        ev.sessions.forEach(s => { html += `<div class="leg-row"><span class="lbl">${s.time}</span><span class="val">${s.name}</span></div>` })
        html += `</div>`
      }
    }
  }

  if (ev.manually_added) {
    html += `<button class="open-edit-btn" onclick="showNonFlightForm('${ev.date}', window._nfEntry)">✏️ 修改</button>`
    html += `<button class="add-del-btn" onclick="deleteNonFlight('${ev.id}')">刪除</button>`
  }
  if (ev.type === 'standby' && !isPast(ev.date)) {
    html += `<button class="open-add-day-btn" onclick="showAddForm('${ev.date}')">＋ 新增</button>`
  }
  window._nfEntry = ev
  document.getElementById('modal-content').innerHTML = html
  document.getElementById('modal-overlay').classList.add('active')
}

async function deleteNonFlight(id) {
  if (!confirm('確定刪除？')) return
  await fetch(`/api/schedule/${MY_USER_ID}/${id}`, { method:'DELETE' }).catch(()=>{})
  document.getElementById('modal-overlay').classList.remove('active')
  await loadSchedule()
}

function showNonFlightForm(dateStr, ev) {
  const typeMap = { training:'training', day_off:'dayoff', meeting:'meeting', standby:'standby', private:'private' }
  _taskType = typeMap[ev.type] || 'dayoff'
  _taskNote = ev.code || ''
  _taskPrivateTitle = ev.title || ''
  _taskPrivateDesc  = ev.note  || ''
  if (ev.startDate && ev.endDate) {
    const ms = new Date(ev.endDate+'T12:00:00') - new Date(ev.startDate+'T12:00:00')
    _taskDayoffDays = Math.round(ms/86400000) + 1
  } else {
    _taskDayoffDays = 1
  }
  _taskSbyStart = ev.start_time ? ev.start_time.slice(0,2)+':'+ev.start_time.slice(2,4) : ''
  _taskSbyEnd   = ev.end_time   ? ev.end_time.slice(0,2)+':'+ev.end_time.slice(2,4)     : ''
  _editTask = null
  _editNonFlight = ev
  _renderAddForm(dateStr, true)
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('active')
})

document.getElementById('refresh-btn').addEventListener('click', async () => {
  const btn = document.getElementById('refresh-btn')
  btn.textContent = '⏳'
  btn.disabled = true
  try {
    const res = await fetch('/api/refresh', { method: 'POST' })
    if (res.ok) {
      await loadSchedule()
      btn.textContent = '✓'
      setTimeout(() => { btn.textContent = '↻'; btn.disabled = false }, 1500)
    } else {
      btn.textContent = '✗'
      setTimeout(() => { btn.textContent = '↻'; btn.disabled = false }, 2000)
    }
  } catch {
    btn.textContent = '✗'
    setTimeout(() => { btn.textContent = '↻'; btn.disabled = false }, 2000)
  }
})
// ── Settings ────────────────────────────────────────────────
function getSettings() {
  try { return JSON.parse(localStorage.getItem('cCalSettings') || '{}') } catch { return {} }
}
function saveSettings(s) { localStorage.setItem('cCalSettings', JSON.stringify(s)) }

function showSettingsModal(fromSwap) {
  window._settingsFromSwap = fromSwap || false
  const s = getSettings()
  const backLink = fromSwap && window._swapTask
    ? `← <span style="color:#007aff;cursor:pointer;" onclick="showSwapForm()">返回</span>`
    : ''
  document.getElementById('modal-content').innerHTML = `
    <div class="task-date" style="margin-bottom:6px;">${backLink}</div>
    <div class="task-route" style="margin-bottom:14px;">換班板設定</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="sf-group">
        <div class="sf-label">LINE User ID（在換班 Bot 傳「我的ID」取得）</div>
        <input class="sf-input" id="sf-userid" placeholder="Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" value="${s.lineUserId||''}" autocomplete="off" spellcheck="false">
      </div>
      <div class="sf-group">
        <div class="sf-label">顯示名稱（換班板上的署名）</div>
        <input class="sf-input" id="sf-name" placeholder="例：Lucas" value="${s.displayName||''}">
      </div>
      <div class="sf-group">
        <div class="sf-label">換班 Bot URL（Railway 網址）</div>
        <input class="sf-input" id="sf-boturl" placeholder="https://xxx.railway.app" value="${s.botUrl||''}" autocomplete="off" inputmode="url" spellcheck="false">
      </div>
      <div class="sf-group">
        <div class="sf-label">API Secret（CCAL_API_SECRET 環境變數）</div>
        <input class="sf-input" id="sf-secret" type="password" placeholder="在 Railway 設定的密碼" value="${s.apiSecret||''}" autocomplete="new-password">
      </div>
      <button class="sf-save-btn" onclick="saveSettingsForm()">儲存</button>
    </div>
  `
  document.getElementById('modal-overlay').classList.add('active')
}

function saveSettingsForm() {
  saveSettings({
    lineUserId:  document.getElementById('sf-userid').value.trim(),
    displayName: document.getElementById('sf-name').value.trim(),
    botUrl:      document.getElementById('sf-boturl').value.trim().replace(/\/$/, ''),
    apiSecret:   document.getElementById('sf-secret').value.trim()
  })
  if (window._settingsFromSwap && window._swapTask) showSwapForm()
  else document.getElementById('modal-overlay').classList.remove('active')
}

// ── Swap form ────────────────────────────────────────────────
function showSwapForm() {
  const task = window._swapTask
  if (!task) return
  const s = getSettings()
  if (!s.lineUserId || !s.botUrl || !s.apiSecret) {
    showSettingsModal(true)
    return
  }
  const sp = task.startDate.split('-')
  const dayNum = parseInt(sp[2])
  const d = new Date(task.startDate + 'T12:00:00')
  const wd = ['日','一','二','三','四','五','六']
  const dateLabel = `${+sp[1]} 月 ${dayNum} 日（${wd[d.getDay()]}）`
  const commOptions = [
    { label:'可議', val:0 }, { label:'無料', val:-1 }
  ]
  // 只取第一腿代表整個任務（換班都是整任務換，看板只顯示出程班號）
  const firstLeg = task.legs[0]
  const firstLegDay = String(parseInt(firstLeg.date.split('-')[2]))
  window._swapType = 'throw'
  window._swapComm = 0
  window._swapDate = dayNum
  window._swapFlights = [{ date: firstLegDay, flight: String(firstLeg.flight_number) }]

  let commBtns = commOptions.map((o, i) =>
    `<button class="comm-btn${i===0?' active':''}" onclick="setComm(${o.val},this)">${o.label}</button>`
  ).join('')

  document.getElementById('modal-content').innerHTML = `
    <div class="task-date" style="margin-bottom:6px;">
      ← <span style="color:#007aff;cursor:pointer;" onclick="showDetail(window._swapTask)">返回</span>
    </div>
    <div class="task-route" style="margin-bottom:4px;">發布到換班板</div>
    <div class="swap-flight-info">${dateLabel}　${taskRoute(task)}</div>
    <div class="swap-type-row">
      <button class="swap-type-btn active" id="btn-throw" onclick="setSwapType('throw')">✈️ 丟班</button>
      <button class="swap-type-btn" id="btn-accept" onclick="setSwapType('accept')">🙋 接班</button>
    </div>
    <div class="comm-label">出價</div>
    <div class="comm-grid" id="comm-grid">
      ${commBtns}
      <div style="display:flex;align-items:center;gap:4px;">
        <input type="number" id="comm-custom" min="0.5" max="10" step="0.5"
          placeholder="　" style="width:56px;border:1.5px solid #e5e5ea;border-radius:8px;padding:7px 6px;font-size:13px;font-weight:600;text-align:center;outline:none;"
          oninput="setCommCustom(this)">
        <span style="font-size:13px;font-weight:600;">圈</span>
      </div>
    </div>
    <input class="swap-note-input" id="swap-note" placeholder="備注（選填，如：換321的班）" maxlength="50">
    <button class="swap-post-btn" id="swap-post-btn" onclick="submitSwap()">送出</button>
  `
  document.getElementById('modal-overlay').classList.add('active')
}

function setSwapType(type) {
  window._swapType = type
  document.getElementById('btn-throw').classList.toggle('active', type === 'throw')
  document.getElementById('btn-accept').classList.toggle('active', type === 'accept')
  const legArea = document.getElementById('leg-label')
  const legGrid = document.getElementById('leg-grid')
  if (legArea) legArea.style.display = type === 'throw' ? '' : 'none'
  if (legGrid) legGrid.style.display = type === 'throw' ? '' : 'none'
}

function toggleSwapLeg(i, btn) {
  window._swapLegs[i].on = !window._swapLegs[i].on
  btn.classList.toggle('active', window._swapLegs[i].on)
  window._swapFlights = window._swapLegs.filter(l => l.on).map(l => ({ date: l.date, flight: l.flight }))
}

function setComm(val, btn) {
  window._swapComm = val
  document.querySelectorAll('#comm-grid .comm-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  const ci = document.getElementById('comm-custom')
  if (ci) { ci.value = ''; ci.style.borderColor = '#e5e5ea' }
}

function setCommCustom(input) {
  const v = parseFloat(input.value)
  document.querySelectorAll('#comm-grid .comm-btn').forEach(b => b.classList.remove('active'))
  if (!isNaN(v) && v > 0) {
    window._swapComm = v
    input.style.borderColor = '#007aff'
  } else {
    window._swapComm = 0
    input.style.borderColor = '#e5e5ea'
  }
}

async function submitSwap() {
  const s = getSettings()
  const btn = document.getElementById('swap-post-btn')
  btn.disabled = true
  btn.textContent = '發布中…'
  const body = {
    type: window._swapType,
    userId: s.lineUserId,
    displayName: s.displayName || '組員',
    commission: window._swapComm,
    note: (document.getElementById('swap-note').value || '').trim()
  }
  if (window._swapType === 'throw') body.flights = window._swapFlights
  else body.date = window._swapDate

  try {
    const res = await fetch(s.botUrl + '/api/post-shift', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CCal-Secret': s.apiSecret },
      body: JSON.stringify(body)
    })
    const data = await res.json()
    if (data.ok) {
      const noteConfirm = data.note ? `<div style="font-size:13px;color:#34c759;margin-top:4px;">備注：${data.note}</div>` : ''
      document.getElementById('modal-content').innerHTML = `
        <div style="text-align:center;padding:24px 0;">
          <div style="font-size:44px;margin-bottom:12px;">✅</div>
          <div style="font-size:17px;font-weight:700;margin-bottom:6px;">已發布到換班板！</div>
          <div style="font-size:13px;color:#8e8e93;">${data.action==='updated'?'（更新原有需求，重新計算30小時）':''}</div>
          ${noteConfirm}
        </div>
      `
    } else {
      btn.disabled = false; btn.textContent = '送出'
      alert('發布失敗：' + (data.error || '未知錯誤'))
    }
  } catch {
    btn.disabled = false; btn.textContent = '送出'
    alert('連線失敗，請確認 Bot URL 是否正確')
  }
}

    const acBtns = _AC_TYPES.map(ac =>
      `<button class="ac-btn${seg.acType===ac?' active':''}" onclick="setSegAc(${i},'${ac}')">${ac}</button>`
    ).join('')

      <hr class="leg-divider">

function setTaskType(type, btn) {
  _taskType = type
  document.querySelectorAll('.duty-type-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('flight-fields').style.display   = type === 'flight'  ? 'block' : 'none'
  document.getElementById('standby-fields').style.display  = type === 'standby' ? 'block' : 'none'
  document.getElementById('private-fields').style.display  = type === 'private' ? 'block' : 'none'
  document.getElementById('dayoff-fields').style.display   = type === 'dayoff'  ? 'block' : 'none'
  const showNF = !['flight','standby','private','dayoff'].includes(type)
  document.getElementById('nonflight-fields').style.display = showNF ? 'block' : 'none'
}

function setSegAc(idx, ac) {
  _syncFromDom()
  _taskSegs[idx].acType = _taskSegs[idx].acType === ac ? '' : ac
  _renderSegs()
}

function addSeg() {
  _syncFromDom()
  const prev = _taskSegs[_taskSegs.length - 1]
  _taskSegs.push({ fn: '', acType: prev.acType || '', from: prev.to || '', to: '', dep: '', arr: '' })
  _renderSegs()
}

function removeSeg(idx) {
  _syncFromDom()
  _taskSegs.splice(idx, 1)
  _renderSegs()
}

function _syncFromDom() {
  const note = document.getElementById('task-note'); if (note) _taskNote = note.value.trim()
  const sbyFn = document.getElementById('sby-fn'); if (sbyFn && _taskType === 'standby') _taskNote = sbyFn.value.trim()
  const privTitle = document.getElementById('private-title'); if (privTitle) _taskPrivateTitle = privTitle.value.trim()
  const privDesc  = document.getElementById('private-desc');  if (privDesc)  _taskPrivateDesc  = privDesc.value.trim()
  const dofCode = document.getElementById('dayoff-code'); if (dofCode && _taskType === 'dayoff') _taskNote = dofCode.value.trim().toUpperCase()
  const dofDays = document.getElementById('dayoff-days'); if (dofDays) _taskDayoffDays = parseInt(dofDays.value) || 1
  const sbyS  = document.getElementById('sby-start'); if (sbyS) _taskSbyStart = sbyS.value
  const sbyE  = document.getElementById('sby-end');   if (sbyE) _taskSbyEnd   = sbyE.value
  const days = document.getElementById('task-days'); if (days) _taskDays = parseInt(days.value) || 1
  const rep = document.getElementById('task-rep'); if (rep) _taskRep = rep.value
  _taskSegs.forEach((seg, i) => {
    const fn   = document.getElementById(`seg-fn-${i}`);   if (fn)   seg.fn   = fn.value.trim()
    const from = document.getElementById(`seg-from-${i}`); if (from) seg.from = from.value.toUpperCase()
    const to   = document.getElementById(`seg-to-${i}`);   if (to)   seg.to   = to.value.toUpperCase()
    const dep  = document.getElementById(`seg-dep-${i}`);  if (dep)  seg.dep  = dep.value
    const arr  = document.getElementById(`seg-arr-${i}`);  if (arr)  seg.arr  = arr.value
  })
}

function _showFormErr(msg) {
  let el = document.getElementById('form-err')
  if (!el) {
    el = document.createElement('div')
    el.id = 'form-err'
    el.style.cssText = 'color:#c0392b;font-size:13px;font-weight:600;padding:6px 0 2px;text-align:center'
    const mc = document.getElementById('modal-content')
    if (mc) mc.insertBefore(el, mc.firstChild)
  }
  el.textContent = msg
}

async function submitFlight(baseDate) {
  document.activeElement?.blur()   // 先收鍵盤，確保 iOS 能正確讀到 input 值
  _syncFromDom()
  const errEl = document.getElementById('form-err'); if (errEl) errEl.textContent = ''

  if (_taskType === 'standby') {
    const fn = _taskNote.trim()
    if (!fn) { _showFormErr('請填寫班號'); return }
    const entry = { type:'standby', code: fn, date: baseDate, manually_added: true }
    if (_taskSbyStart) entry.start_time = _taskSbyStart.replace(':','')
    if (_taskSbyEnd)   entry.end_time   = _taskSbyEnd.replace(':','')
    try {
      if (_editNonFlight && _editNonFlight.id) {
        await fetch(`/api/schedule/${MY_USER_ID}/${_editNonFlight.id}`, { method:'DELETE' }).catch(()=>{})
        _editNonFlight = null
      }
      await fetch(`/api/schedule/${MY_USER_ID}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry) })
      document.getElementById('modal-overlay').classList.remove('active')
      await loadSchedule()
    } catch { _showFormErr('連線失敗，請稍後再試') }
    return
  }

  if (_taskType === 'private') {
    if (!_taskPrivateTitle) { _showFormErr('請填寫標題'); return }
    const entry = {
      type: 'private',
      code: 'PV',
      title: _taskPrivateTitle,
      note: _taskPrivateDesc || '',
      date: baseDate,
      manually_added: true
    }
    try {
      if (_editNonFlight && _editNonFlight.id) {
        await fetch(`/api/schedule/${MY_USER_ID}/${_editNonFlight.id}`, { method:'DELETE' }).catch(()=>{})
        _editNonFlight = null
      }
      await fetch(`/api/schedule/${MY_USER_ID}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry) })
      document.getElementById('modal-overlay').classList.remove('active')
      await loadSchedule()
    } catch { _showFormErr('連線失敗，請稍後再試') }
    return
  }

  if (_taskType !== 'flight') {
    const typeMap = { training:'training', dayoff:'day_off', meeting:'meeting' }
    const codeMap = { training:'受訓', dayoff:'AL', meeting:'會議' }
    const userCode = _taskNote.trim().toUpperCase() || codeMap[_taskType]
    const days = _taskType === 'dayoff' ? Math.max(1, _taskDayoffDays) : 1
    const entry = {
      type: typeMap[_taskType] || _taskType,
      code: userCode,
      date: baseDate,
      startDate: baseDate,
      endDate: addDays(baseDate, days - 1),
      manually_added: true
    }
    try {
      if (_editNonFlight && _editNonFlight.id) {
        await fetch(`/api/schedule/${MY_USER_ID}/${_editNonFlight.id}`, { method:'DELETE' }).catch(()=>{})
        _editNonFlight = null
      }
      await fetch(`/api/schedule/${MY_USER_ID}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry) })
      document.getElementById('modal-overlay').classList.remove('active')
      await loadSchedule()
    } catch { alert('連線失敗') }
    return
  }

  const primaryFn = _taskSegs[0]?.fn || ''
  if (!primaryFn) { _showFormErr('請填寫第一段班號'); return }

  if (_editTask) {
    for (const leg of _editTask.legs) {
      if (leg.id) await fetch(`/api/schedule/${MY_USER_ID}/${leg.id}`, { method:'DELETE' }).catch(()=>{})
    }
  }

  const dutyId = 'duty_' + Date.now()
  const ts = Date.now()
  const n = _taskSegs.length
  for (let i = 0; i < n; i++) {
    const seg = _taskSegs[i]
    const segFn = i === 0 ? primaryFn : (seg.fn || '')
    const legDate = i === 0 ? baseDate : i === n-1 ? addDays(baseDate, _taskDays-1) : baseDate
    const entry = { id:`manual_${ts}_${i}`, duty_id:dutyId, type:'flight', date:legDate, flight_number:segFn }
    if (seg.from)   entry.from = seg.from
    if (seg.to)     entry.to   = seg.to
    if (seg.dep)    entry.departure_scheduled = seg.dep.replace(':','')
    if (seg.arr)    entry.arrival_scheduled   = seg.arr.replace(':','')
    if (seg.acType) entry.aircraft_type = seg.acType
    if (i === 0 && _taskRep) entry.reporting = _taskRep.replace(':','')
    const res = await fetch(`/api/schedule/${MY_USER_ID}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry) })
    const data = await res.json()
    if (!data.ok) { _showFormErr('儲存失敗'); return }
  }
  document.getElementById('modal-overlay').classList.remove('active')
  await loadSchedule()
}

async function deleteEntry() {
  const task = _editTask || window._swapTask
  if (!task || !confirm('確定刪除此勤務所有航段？')) return
  for (const leg of task.legs) {
    if (leg.id) await fetch(`/api/schedule/${MY_USER_ID}/${leg.id}`, { method:'DELETE' }).catch(()=>{})
  }
  document.getElementById('modal-overlay').classList.remove('active')
  await loadSchedule()
}

;(() => {

  // 只有看自己的班表才顯示匯入鈕
  if (IS_VIEWING_OTHER) { btn.style.display = 'none' }

  btn.addEventListener('click', () => {
    if (IS_VIEWING_OTHER) return
    const input = document.createElement('input')
    input.type = 'file'
    input.accept = '.pdf,application/pdf'
    input.onchange = async () => {
      const file = input.files[0]
      if (!file) return
      btn.textContent = '⏳'
      btn.disabled = true
      try {
        const form = new FormData()
        form.append('pdf', file)
        const res = await fetch(`/api/import/${MY_USER_ID}`, { method: 'POST', body: form })
        const json = await res.json()
        if (json.ok) {
          await loadSchedule()
          alert(`✅ 匯入完成：${json.imported} 筆班表資料`)
        } else {
          alert('❌ 匯入失敗：' + (json.error || '未知錯誤'))
        }
      } catch (e) {
        alert('❌ 匯入失敗：' + e.message)
      } finally {
        btn.textContent = '📥'
        btn.disabled = false
      }
    }
    input.click()
  })

      <input id="view-code-input" class="add-field-input" maxlength="6" placeholder="輸入 6 位代碼"
        style="flex:1;margin-bottom:0;text-transform:uppercase;letter-spacing:4px;font-weight:700;font-size:16px;text-align:center">
      <button onclick="goViewOther()" style="background:#007aff;color:#fff;border:none;border-radius:10px;padding:0 14px;font-size:14px;font-weight:700;cursor:pointer">查看</button>
      <button onclick="goCompare()" style="background:#fff;color:#007aff;border:1.5px solid #007aff;border-radius:10px;padding:0 14px;font-size:14px;font-weight:700;cursor:pointer">比對</button>
    </div>
    <div id="view-code-err" style="color:#ff3b30;font-size:12px;margin-top:6px;min-height:16px"></div>
    ${chipsHtml}
  `
  document.getElementById('modal-overlay').classList.add('active')
  setTimeout(() => {
    const inp = document.getElementById('view-code-input')
    if (inp) inp.addEventListener('input', e => { e.target.value = e.target.value.toUpperCase() })
  }, 50)
}

async function quickCompare(code, name) {
  document.getElementById('view-code-err').textContent = '載入中…'
  const res = await fetch(`/api/schedule/${code}`).catch(() => null)
  if (!res || !res.ok) { document.getElementById('view-code-err').textContent = '找不到此代碼的班表'; return }
  const data = await res.json()
  if (!Array.isArray(data) || data.length === 0) { document.getElementById('view-code-err').textContent = '此代碼尚無班表資料'; return }
  _addToCompareList(code, data, name)
  document.getElementById('modal-overlay').classList.remove('active')
  if (viewUserId !== MY_USER_ID) { viewUserId = MY_USER_ID; await loadSchedule() }
  else { renderCalendar() }
  _updateCompareBanner()
  _maybeShowSaveHint(code)
}

async function deleteContact(code) {
  await fetch(`/api/contacts/${MY_USER_ID}/${code}`, { method:'DELETE' }).catch(() => {})
  showUserCodeModal()
}


async function goViewOther() {
  const code = (document.getElementById('view-code-input').value || '').toUpperCase().trim()
  if (!/^[A-Z0-9]{6}$/.test(code)) {
    document.getElementById('view-code-err').textContent = '請輸入正確的 6 位代碼'; return
  }
  document.getElementById('view-code-err').textContent = '載入中…'
  const res = await fetch(`/api/schedule/${code}`).catch(() => null)
  if (!res || !res.ok) { document.getElementById('view-code-err').textContent = '找不到此代碼的班表'; return }
  const data = await res.json()
  if (!Array.isArray(data) || data.length === 0) { document.getElementById('view-code-err').textContent = '此代碼尚無班表資料'; return }
  viewUserId = code
  history.replaceState({}, '', '?view=' + code)
  document.getElementById('modal-overlay').classList.remove('active')
  await loadSchedule()
  _maybeShowSaveHint(code)
}

function _addToCompareList(code, data, name) {
  if (compareList.some(c => c.userId === code)) return
  const entry = { userId: code, name: name || code, data, tasks: groupTasks(data.filter(e => e.type === 'flight')) }
  if (compareList.length >= 2) compareList.shift()
  compareList.push(entry)
}

async function goCompare() {
  const code = (document.getElementById('view-code-input').value || '').toUpperCase().trim()
  if (!/^[A-Z0-9]{6}$/.test(code)) {
    document.getElementById('view-code-err').textContent = '請輸入正確的 6 位代碼'; return
  }
  document.getElementById('view-code-err').textContent = '載入中…'
  const res = await fetch(`/api/schedule/${code}`).catch(() => null)
  if (!res || !res.ok) { document.getElementById('view-code-err').textContent = '找不到此代碼的班表'; return }
  const data = await res.json()
  if (!Array.isArray(data) || data.length === 0) { document.getElementById('view-code-err').textContent = '此代碼尚無班表資料'; return }
  const contacts = await fetch(`/api/contacts/${MY_USER_ID}`).then(r => r.json()).catch(() => [])
  const contact = contacts.find(c => c.code === code)
  _addToCompareList(code, data, contact?.name)
  document.getElementById('modal-overlay').classList.remove('active')
  if (viewUserId !== MY_USER_ID) { viewUserId = MY_USER_ID; await loadSchedule() }
  else { renderCalendar() }
  _updateCompareBanner()
  _maybeShowSaveHint(code)
}

// 若代碼不在聯絡人，在比對橫幅旁顯示「＋儲存」提示
async function _maybeShowSaveHint(code) {
  const contacts = await fetch(`/api/contacts/${MY_USER_ID}`).then(r => r.json()).catch(() => [])
  if (contacts.some(c => c.code === code)) return
  // 在橫幅區插入儲存提示
  let hint = document.getElementById('save-hint-bar')
  if (!hint) {
    hint = document.createElement('div')
    hint.id = 'save-hint-bar'
    hint.style.cssText = 'background:#fffbe6;color:#7a5c00;font-size:12px;font-weight:600;text-align:center;padding:6px 12px;display:flex;align-items:center;justify-content:center;gap:8px'
    const banner = document.getElementById('cmp-banner') || document.getElementById('calendar')
    banner.parentNode.insertBefore(hint, banner.nextSibling)
  }
  hint.innerHTML = `儲存「${code}」為常用？暱稱：
    <input id="save-hint-name" placeholder="${code}" maxlength="8"
      style="width:64px;border:1px solid #c9a800;border-radius:6px;padding:2px 6px;font-size:12px">
    <button onclick="_saveContactFromHint('${code}')"
      style="background:#007aff;color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;cursor:pointer">儲存</button>
    <button onclick="document.getElementById('save-hint-bar').remove()"
      style="background:none;border:none;color:#8e8e93;font-size:12px;cursor:pointer">略過</button>`
}

async function _saveContactFromHint(code) {
  const name = (document.getElementById('save-hint-name')?.value || '').trim() || code
  await fetch(`/api/contacts/${MY_USER_ID}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ code, name })
  }).catch(() => {})
  const bar = document.getElementById('save-hint-bar')
  if (bar) { bar.innerHTML = `✓ 已儲存「${name}」`; setTimeout(() => bar.remove(), 2000) }
}

function toggleEmpIdEdit() {
  const el = document.getElementById('modal-empid-edit')
  if (!el) return
  el.style.display = el.style.display === 'none' ? 'block' : 'none'
  if (el.style.display === 'block') document.getElementById('modal-empid-inp')?.focus()
}

function saveEmpIdFromModal() {
  const val = (document.getElementById('modal-empid-inp')?.value || '').trim()
  if (!val) return
  localStorage.setItem('cCalEmpId', val)
  updateUserLabel()
  // 更新 modal 顯示
  const disp = document.getElementById('modal-empid-display')
  if (disp) disp.textContent = val
  const edit = document.getElementById('modal-empid-edit')
  if (edit) edit.style.display = 'none'
}

document.getElementById('user-code-btn').addEventListener('click', showUserCodeModal)

// 手機/電腦版切換（僅電腦顯示按鈕）
;(() => {
  const btn = document.getElementById('view-toggle-btn')
  const isDesktop = localStorage.getItem('cCalDesktopMode') === '1'
  if (isDesktop) { document.body.classList.add('desktop-mode'); btn.textContent = '📱' }
  btn.addEventListener('click', () => {
    const on = document.body.classList.toggle('desktop-mode')
    btn.textContent = on ? '📱' : '🖥'
    localStorage.setItem('cCalDesktopMode', on ? '1' : '0')
  })
})()

document.getElementById('prev').addEventListener('click', () => {
  if (--currentMonth < 0) { currentMonth=11; currentYear-- }
  renderCalendar()
})
document.getElementById('next').addEventListener('click', () => {
  if (++currentMonth > 11) { currentMonth=0; currentYear++ }
  renderCalendar()
})

// 左右滑動切換月份
let _tx = 0, _ty = 0
// 禁止 iOS Safari 縮放（viewport meta 對 iOS 無效，需 JS 攔截）
document.addEventListener('gesturestart', e => e.preventDefault(), false)
document.addEventListener('gesturechange', e => e.preventDefault(), false)
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault() }, { passive: false })

document.addEventListener('touchstart', e => {
  _tx = e.touches[0].clientX
  _ty = e.touches[0].clientY
}, { passive: true })
document.addEventListener('touchend', e => {
  if (document.getElementById('modal-overlay').classList.contains('active')) return
  const dx = e.changedTouches[0].clientX - _tx
  const dy = e.changedTouches[0].clientY - _ty
  if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) { if (++currentMonth > 11) { currentMonth=0; currentYear++ } }
    else        { if (--currentMonth < 0)  { currentMonth=11; currentYear-- } }
    renderCalendar()
  }
}, { passive: true })

// 一鍵設定：?setup&lineUserId=...&botUrl=...&apiSecret=...&displayName=...
;(() => {
  const p = new URLSearchParams(location.search)
  if (p.has('setup')) {
    const s = getSettings()
    if (p.get('lineUserId'))  s.lineUserId  = p.get('lineUserId')
    if (p.get('botUrl'))      s.botUrl      = p.get('botUrl')
    if (p.get('apiSecret'))   s.apiSecret   = p.get('apiSecret')
    if (p.get('displayName')) s.displayName = p.get('displayName')
    saveSettings(s)
    history.replaceState({}, '', '/')
  }
})()

// ── 員編 ─────────────────────────────────────────────────────
const MY_EMP_ID = localStorage.getItem('cCalEmpId') || ''

function updateUserLabel() {
  const el = document.getElementById('user-label')
  if (!el) return
  const empId = localStorage.getItem('cCalEmpId') || ''
  el.textContent = empId ? `${empId} / ${MY_USER_ID}` : MY_USER_ID
}

// ── 密碼閘門 ─────────────────────────────────────────────────
async function submitGate() {
  const btn = document.getElementById('gate-btn')
  const code = document.getElementById('gate-input').value.trim()
  if (!code) return
  btn.disabled = true
  btn.textContent = '驗證中…'
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    })
    if (res.ok) {
      localStorage.setItem('cCalUserId', MY_USER_ID)
      // 進入第二步：員編
      document.getElementById('gate-step1').style.display = 'none'
      document.getElementById('gate-step2').style.display = 'block'
      setTimeout(() => document.getElementById('gate-empid').focus(), 50)
    } else {
      document.getElementById('gate-err').textContent = '密碼錯誤，請再試一次'
      btn.disabled = false
      btn.textContent = '進入'
    }
  } catch {
    document.getElementById('gate-err').textContent = '連線失敗，請稍後再試'
    btn.disabled = false
    btn.textContent = '進入'
  }
}

function submitEmpId() {
  const val = document.getElementById('gate-empid').value.trim()
  if (!val) {
    document.getElementById('gate-empid-err').textContent = '請輸入員編'
    return
  }
  localStorage.setItem('cCalEmpId', val)
  document.getElementById('gate-overlay').classList.remove('active')
  updateUserLabel()
  loadSchedule()
}

// 已有代碼 → 直接載入；沒有 → 顯示密碼閘門
if (localStorage.getItem('cCalUserId')) {
  updateUserLabel()
  loadSchedule()
} else {
  document.getElementById('gate-overlay').classList.add('active')
  setTimeout(() => document.getElementById('gate-input').focus(), 100)
}
</script>
